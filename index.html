<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --text: #e8eaf6;
      --text-muted: #8b8fa8;
      --border: #2e3250;
      --warn: #fbbf24;
      --green: #34d399;
      --radius: 14px;
    }

    html, body {
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Noto Sans JP', system-ui, sans-serif;
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(79,142,247,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(167,139,250,0.07) 0%, transparent 55%);
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .last-updated { font-size: 0.72rem; color: var(--text-muted); }

    /* ── Main grid ── */
    .main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 12px;
    }

    /* ── Left / Right columns ── */
    .left-col, .right-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    /* ── Card base ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow: hidden;
    }

    .card-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .card-title-actions { display: flex; gap: 6px; align-items: center; }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.danger:hover { border-color: #f87171; color: #f87171; }

    /* ── Clock ── */
    .card-clock {
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a1d27 0%, #1e2138 100%);
    }

    .clock-time {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .clock-date { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 2px; }
    .clock-day  { font-size: 0.78rem; color: var(--text-muted); }

    /* ── Weather ── */
    .card-weather {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .weather-current { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .weather-icon { font-size: 2.8rem; line-height: 1; }
    .weather-temp { font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .weather-desc     { font-size: 0.82rem; color: var(--text-muted); margin-top: 3px; }
    .weather-location { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

    .weather-meta {
      display: flex;
      gap: 16px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .weather-meta-item { display: flex; flex-direction: column; gap: 1px; }
    .weather-meta-item .label { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .weather-meta-item .value { font-size: 0.88rem; font-weight: 600; }

    .forecast { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex-shrink: 0; }

    .forecast-day {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
    }

    .forecast-day .day-name { font-size: 0.62rem; color: var(--text-muted); margin-bottom: 4px; }
    .forecast-day .day-icon { font-size: 1.2rem; margin-bottom: 4px; }
    .forecast-day .day-max  { font-size: 0.78rem; font-weight: 700; color: var(--warn); }
    .forecast-day .day-min  { font-size: 0.7rem; color: #60a5fa; }

    /* ── News ── */
    .card-news {
      flex: 3;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .news-list {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .news-item {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 6px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
      border-radius: 6px;
    }

    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: var(--surface2); }

    .news-num {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 20px;
      flex-shrink: 0;
    }

    .news-title {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .news-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Calendar ── */
    .card-calendar {
      flex: 2;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .cal-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* setup / signin states */
    .cal-state {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
      height: 100%;
    }

    .cal-state p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
    .cal-state code {
      font-family: monospace;
      font-size: 0.75rem;
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent2);
    }

    .cal-signin-btn {
      background: #4285f4;
      color: #fff;
      border: none;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cal-signin-btn:hover { background: #3367d6; }

    /* event groups */
    .cal-group { flex-shrink: 0; }

    .cal-date-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent2);
      text-transform: uppercase;
      padding: 4px 6px 2px;
    }

    .cal-event {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 6px;
      border-radius: 5px;
      transition: background 0.1s;
    }
    .cal-event:hover { background: var(--surface2); }

    .cal-time {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      flex-shrink: 0;
    }

    .cal-title {
      font-size: 0.82rem;
      color: var(--text);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .cal-empty {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 8px 6px;
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-msg {
      font-size: 0.82rem;
      color: #f87171;
      padding: 10px;
      background: rgba(248,113,113,0.08);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Dashboard</h1>
    <span class="last-updated" id="lastUpdated"></span>
  </header>

  <div class="main">
    <!-- Left column -->
    <div class="left-col">

      <div class="card card-clock">
        <div class="card-title">時刻</div>
        <div class="clock-time" id="clockTime">--:--:--</div>
        <div class="clock-date" id="clockDate"></div>
        <div class="clock-day"  id="clockDay"></div>
      </div>

      <div class="card card-weather">
        <div class="card-title">
          天気予報
          <button class="icon-btn" onclick="loadWeather()">更新</button>
        </div>
        <div id="weatherContent" style="display:flex;flex-direction:column;gap:8px">
          <div class="skeleton" style="height:52px;border-radius:8px"></div>
          <div class="skeleton" style="height:14px;width:70%"></div>
          <div class="skeleton" style="height:14px;width:50%"></div>
        </div>
      </div>

    </div>

    <!-- Right column -->
    <div class="right-col">

      <div class="card card-news">
        <div class="card-title">
          NHKニュース
          <button class="icon-btn" onclick="loadNews()">更新</button>
        </div>
        <div id="newsContent" style="display:flex;flex-direction:column;gap:10px">
          <div class="skeleton" style="height:14px;width:90%"></div>
          <div class="skeleton" style="height:14px;width:75%"></div>
          <div class="skeleton" style="height:14px;width:85%"></div>
          <div class="skeleton" style="height:14px;width:70%"></div>
          <div class="skeleton" style="height:14px;width:80%"></div>
        </div>
      </div>

      <div class="card card-calendar">
        <div class="card-title">
          Googleカレンダー
          <div class="card-title-actions">
            <button class="icon-btn" id="calRefreshBtn" onclick="loadCalendar()" style="display:none">更新</button>
            <button class="icon-btn danger" id="calSignoutBtn" onclick="calSignOut()" style="display:none">ログアウト</button>
          </div>
        </div>
        <div class="cal-body" id="calContent">
          <!-- filled by JS -->
        </div>
      </div>

    </div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async onload="initCalendarAuth()"></script>

  <script>
    // ════════════════════════════════════════════════════════════
    //  ★ ここに Google Cloud Console で取得した Client ID を貼り付け
    //    手順: https://console.cloud.google.com/
    //      1. 新しいプロジェクト作成
    //      2. 「APIとサービス」→「ライブラリ」→ Google Calendar API を有効化
    //      3. 「認証情報」→「認証情報を作成」→「OAuthクライアントID」
    //      4. アプリの種類:「ウェブアプリケーション」
    //      5. 承認済みのJavaScript生成元に以下を追加:
    //           https://climbone.github.io
    //           http://localhost (ローカルテスト用)
    //      6. 生成された「クライアントID」を下に貼り付け
    // ════════════════════════════════════════════════════════════
    const GOOGLE_CLIENT_ID = '229119775387-enp8qffrj0e06955qrmok9gact0p713p.apps.googleusercontent.com';

    // ── Clock ─────────────────────────────────────────────────
    const DAYS   = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
    const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const DAY_S  = ['日','月','火','水','木','金','土'];

    function tickClock() {
      const now = new Date();
      const p = n => String(n).padStart(2,'0');
      document.getElementById('clockTime').textContent =
        `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
      document.getElementById('clockDate').textContent =
        `${now.getFullYear()}年 ${MONTHS[now.getMonth()]} ${now.getDate()}日`;
      document.getElementById('clockDay').textContent = DAYS[now.getDay()];
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ── Weather ───────────────────────────────────────────────
    const WMO = {
      0:{l:'快晴',i:'☀️'}, 1:{l:'ほぼ快晴',i:'🌤️'}, 2:{l:'一部曇り',i:'⛅'},
      3:{l:'曇り',i:'☁️'}, 45:{l:'霧',i:'🌫️'}, 48:{l:'霧氷',i:'🌫️'},
      51:{l:'霧雨(弱)',i:'🌦️'}, 53:{l:'霧雨',i:'🌦️'}, 55:{l:'霧雨(強)',i:'🌧️'},
      61:{l:'小雨',i:'🌧️'}, 63:{l:'雨',i:'🌧️'}, 65:{l:'大雨',i:'🌧️'},
      71:{l:'小雪',i:'🌨️'}, 73:{l:'雪',i:'❄️'}, 75:{l:'大雪',i:'❄️'},
      80:{l:'にわか雨',i:'🌦️'}, 81:{l:'にわか雨',i:'🌧️'}, 82:{l:'激しい雨',i:'⛈️'},
      85:{l:'にわか雪',i:'🌨️'}, 86:{l:'大雪',i:'❄️'},
      95:{l:'雷雨',i:'⛈️'}, 96:{l:'雷雨(雹)',i:'⛈️'}, 99:{l:'雷雨(大雹)',i:'⛈️'},
    };
    const wmo = c => WMO[c] ?? {l:'不明',i:'🌡️'};

    function fmtDay(str, i) {
      if (i === 0) return '今日';
      if (i === 1) return '明日';
      return DAY_S[new Date(str).getDay()] + '曜';
    }

    async function getCoords() {
      return new Promise(res => {
        if (!navigator.geolocation) return res(null);
        navigator.geolocation.getCurrentPosition(
          p => res({lat: p.coords.latitude, lon: p.coords.longitude}),
          () => res(null),
          {timeout: 5000}
        );
      });
    }

    async function getCityName(lat, lon) {
      try {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
          {headers: {'Accept-Language': 'ja'}}
        );
        const d = await r.json();
        return d.address?.city || d.address?.town || d.address?.village || d.address?.state || '';
      } catch { return ''; }
    }

    async function loadWeather() {
      const el = document.getElementById('weatherContent');
      el.innerHTML = `<div class="skeleton" style="height:52px;border-radius:8px"></div>
                      <div class="skeleton" style="height:14px;width:70%;margin-top:6px"></div>`;
      try {
        let coords = await getCoords();
        let city = '';
        if (coords) {
          city = await getCityName(coords.lat, coords.lon);
        } else {
          coords = {lat: 35.6762, lon: 139.6503};
          city = '東京';
        }

        const url = `https://api.open-meteo.com/v1/forecast`
          + `?latitude=${coords.lat}&longitude=${coords.lon}`
          + `&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m`
          + `&daily=weathercode,temperature_2m_max,temperature_2m_min`
          + `&timezone=Asia%2FTokyo&forecast_days=5`;

        const d = await (await fetch(url)).json();
        const cur = d.current;
        const cw  = wmo(cur.weathercode);
        const dl  = d.daily;

        const fcHTML = dl.time.map((t, i) => `
          <div class="forecast-day">
            <div class="day-name">${fmtDay(t, i)}</div>
            <div class="day-icon">${wmo(dl.weathercode[i]).i}</div>
            <div class="day-max">${Math.round(dl.temperature_2m_max[i])}°</div>
            <div class="day-min">${Math.round(dl.temperature_2m_min[i])}°</div>
          </div>`).join('');

        el.innerHTML = `
          <div class="weather-current">
            <div class="weather-icon">${cw.i}</div>
            <div>
              <div class="weather-temp">${Math.round(cur.temperature_2m)}°C</div>
              <div class="weather-desc">${cw.l}</div>
              ${city ? `<div class="weather-location">📍 ${city}</div>` : ''}
            </div>
          </div>
          <div class="weather-meta">
            <div class="weather-meta-item">
              <span class="label">湿度</span>
              <span class="value">${cur.relativehumidity_2m}%</span>
            </div>
            <div class="weather-meta-item">
              <span class="label">風速</span>
              <span class="value">${cur.windspeed_10m} km/h</span>
            </div>
          </div>
          <div class="forecast">${fcHTML}</div>`;
      } catch {
        el.innerHTML = `<div class="error-msg">天気情報の取得に失敗しました。</div>`;
      }
    }

    // ── News (NHK RSS) ────────────────────────────────────────
    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function fmtTime(d) {
      const p = n => String(n).padStart(2,'0');
      return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function getTagText(item, tag) {
      return item.getElementsByTagName(tag)[0]?.textContent?.trim() || '';
    }

    async function loadNews() {
      const el = document.getElementById('newsContent');
      el.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:8px">読み込み中...</div>';
      try {
        const rssUrl = 'https://www3.nhk.or.jp/rss/news/cat0.xml';
        const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(rssUrl));
        if (!res.ok) throw new Error('fetch failed');
        const xml = new DOMParser().parseFromString(await res.text(), 'application/xml');

        const NEWS_COUNT = 7;
        const items = [...xml.querySelectorAll('item')].slice(0, NEWS_COUNT).map(item => ({
          title: getTagText(item, 'title'),
          link:  getTagText(item, 'guid') || getTagText(item, 'link') || '#',
          time:  (() => { const p = getTagText(item, 'pubDate'); return p ? fmtTime(new Date(p)) : ''; })(),
        }));

        if (!items.length) throw new Error('empty');

        el.innerHTML = `<div class="news-list">${
          items.map((it, i) => `
            <a class="news-item" href="${escHtml(it.link)}" target="_blank" rel="noopener noreferrer">
              <span class="news-num">${String(i+1).padStart(2,'0')}</span>
              <span class="news-title">${escHtml(it.title)}</span>
              <span class="news-time">${it.time}</span>
            </a>`).join('')
        }</div>`;
      } catch {
        el.innerHTML = `<div class="error-msg">ニュースの取得に失敗しました。</div>`;
      }
    }

    // ── Google Calendar ───────────────────────────────────────
    let gTokenClient = null;
    let gAccessToken = null;

    function initCalendarAuth() {
      const el = document.getElementById('calContent');

      if (!GOOGLE_CLIENT_ID) {
        el.innerHTML = `
          <div class="cal-state">
            <p>Client ID が未設定です。<br>
              <code>index.html</code> の先頭にある<br>
              <code>GOOGLE_CLIENT_ID</code> を設定してください。</p>
          </div>`;
        return;
      }

      gTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/calendar.readonly',
        callback: async (resp) => {
          if (resp.error) {
            document.getElementById('calContent').innerHTML =
              `<div class="error-msg">認証エラー: ${resp.error}</div>`;
            return;
          }
          gAccessToken = resp.access_token;
          document.getElementById('calSignoutBtn').style.display = '';
          document.getElementById('calRefreshBtn').style.display = '';
          await loadCalendar();
        },
      });

      el.innerHTML = `
        <div class="cal-state">
          <p>Googleアカウントでログインして<br>カレンダーを表示します。</p>
          <button class="cal-signin-btn" onclick="calSignIn()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Googleでログイン
          </button>
        </div>`;
    }

    function calSignIn() {
      if (gTokenClient) gTokenClient.requestAccessToken();
    }

    function calSignOut() {
      if (gAccessToken) {
        google.accounts.oauth2.revoke(gAccessToken, () => {});
        gAccessToken = null;
      }
      document.getElementById('calSignoutBtn').style.display = 'none';
      document.getElementById('calRefreshBtn').style.display = 'none';
      initCalendarAuth();
    }

    async function loadCalendar() {
      if (!gAccessToken) return;
      const el = document.getElementById('calContent');
      el.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:4px 6px">読み込み中...</div>';

      try {
        const now     = new Date();
        const endDate = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
        const params  = new URLSearchParams({
          timeMin:      now.toISOString(),
          timeMax:      endDate.toISOString(),
          singleEvents: 'true',
          orderBy:      'startTime',
          maxResults:   '20',
        });

        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`,
          {headers: {Authorization: `Bearer ${gAccessToken}`}}
        );

        if (res.status === 401) {
          gAccessToken = null;
          initCalendarAuth();
          return;
        }

        const data   = await res.json();
        const events = data.items ?? [];

        // 日付ごとにグループ化
        const todayStr    = toDateStr(now);
        const tomorrowStr = toDateStr(new Date(now.getTime() + 86400000));
        const groups      = {};

        for (const ev of events) {
          const key = ev.start.dateTime
            ? ev.start.dateTime.substring(0, 10)
            : ev.start.date;
          if (!groups[key]) groups[key] = [];
          groups[key].push(ev);
        }

        if (!Object.keys(groups).length) {
          el.innerHTML = '<div class="cal-empty">今週の予定はありません</div>';
          return;
        }

        el.innerHTML = Object.entries(groups).map(([date, evs]) => {
          const label = date === todayStr    ? '今日'
                      : date === tomorrowStr ? '明日'
                      : fmtDateLabel(date);
          const evHTML = evs.map(ev => {
            const timeStr = ev.start.dateTime
              ? fmtEventTime(new Date(ev.start.dateTime))
              : '終日';
            return `<div class="cal-event">
              <span class="cal-time">${timeStr}</span>
              <span class="cal-title">${escHtml(ev.summary || '(タイトルなし)')}</span>
            </div>`;
          }).join('');
          return `<div class="cal-group">
            <div class="cal-date-label">${label}</div>
            ${evHTML}
          </div>`;
        }).join('');

      } catch {
        el.innerHTML = `<div class="error-msg">カレンダーの取得に失敗しました。</div>`;
      }
    }

    function toDateStr(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function fmtEventTime(d) {
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function fmtDateLabel(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getMonth()+1}/${d.getDate()}(${DAY_S[d.getDay()]})`;
    }

    // ── Init ──────────────────────────────────────────────────
    function updateLastUpdated() {
      const now = new Date();
      const p = n => String(n).padStart(2,'0');
      document.getElementById('lastUpdated').textContent =
        `最終更新 ${p(now.getHours())}:${p(now.getMinutes())}`;
    }

    Promise.all([loadWeather(), loadNews()]).then(updateLastUpdated);
    setInterval(() => { loadWeather(); updateLastUpdated(); }, 30 * 60 * 1000);
    setInterval(() => { loadNews();   updateLastUpdated(); }, 15 * 60 * 1000);
    setInterval(() => { if (gAccessToken) loadCalendar(); }, 15 * 60 * 1000);
  </script>
</body>
</html>
